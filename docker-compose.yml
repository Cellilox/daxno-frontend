# Docker Compose for testing daxno-frontend with PWA
version: '3.8'

services:
  daxno-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        - NEXT_PUBLIC_ONYX_URL=${NEXT_PUBLIC_ONYX_URL:-http://localhost:3000}
        - NEXT_PUBLIC_CLIENT_ID=${NEXT_PUBLIC_CLIENT_ID}
        - NEXT_PUBLIC_CLERK_SIGN_IN_URL=${NEXT_PUBLIC_CLERK_SIGN_IN_URL:-/auth/login}
        - NEXT_PUBLIC_CLERK_SIGN_UP_URL=${NEXT_PUBLIC_CLERK_SIGN_UP_URL:-/auth/signup}
        - NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL=${NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL:-/projects}
        - NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL=${NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL:-/projects}
        - NEXT_PUBLIC_CLIENT_URL=${NEXT_PUBLIC_CLIENT_URL:-http://localhost:3001}
        - NEXT_PUBLIC_PAYMENT_CURRENCY=${NEXT_PUBLIC_PAYMENT_CURRENCY:-USD}
        - NEXT_PUBLIC_CREDIT_DEFAULT_AMOUNT=${NEXT_PUBLIC_CREDIT_DEFAULT_AMOUNT:-30}
        - NEXT_PUBLIC_CREDIT_MIN_AMOUNT=${NEXT_PUBLIC_CREDIT_MIN_AMOUNT:-5}
        - NEXT_PUBLIC_BYOK_MONTHLY_PRICE=${NEXT_PUBLIC_BYOK_MONTHLY_PRICE:-10}
        - NEXT_PUBLIC_BYOK_YEARLY_PRICE=${NEXT_PUBLIC_BYOK_YEARLY_PRICE:-100}
        - NEXT_PUBLIC_BYOK_PRORATION_INTERVAL_DAYS=${NEXT_PUBLIC_BYOK_PRORATION_INTERVAL_DAYS:-30}
        - NEXT_PUBLIC_FEE_TIERS=${NEXT_PUBLIC_FEE_TIERS:-5-20:35,21-50:30,51-100:25,101+:20}
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
    volumes:
      # Mount for hot reload during development (optional)
      - ./.env.local:/app/.env.local:ro
    restart: unless-stopped
