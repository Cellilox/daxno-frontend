name: Test Daxno Frontend

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  # Fast, dependency-free unit gate — the CI mirror of the Husky pre-commit hook.
  # Pure-logic Vitest suite (lib helpers, billing math, SSRF allowlist). Runs on
  # every push/PR and is the gate that blocks a regression from landing.
  vitest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest unit suite
        run: npm run test

  # Cypress E2E needs a full live stack (Next + backend API + Clerk + a test DB),
  # so it is NOT part of the push/PR gate — it would be red without that stack.
  # Run it on demand once the CLERK_TEST_* / API_URL secrets and a reachable
  # backend are wired up. Uses the already-present start-server-and-test dep.
  cypress-e2e:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress E2E (requires a live backend + Clerk test creds)
        run: npx start-server-and-test "PORT=3001 npm run dev" http://localhost:3001 "npm run cypress:run"
        env:
          CYPRESS_CLERK_TEST_EMAIL: ${{ secrets.CLERK_TEST_EMAIL }}
          CYPRESS_CLERK_TEST_PASSWORD: ${{ secrets.CLERK_TEST_PASSWORD }}
          CYPRESS_API_URL: ${{ secrets.API_URL }}
